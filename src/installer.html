<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw One-Click Installer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .features {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #555;
        }

        .feature:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            color: #667eea;
            font-size: 20px;
            margin-right: 15px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-install {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-install:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-install:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .progress {
            margin-top: 20px;
            display: none;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .log {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            display: none;
        }

        .log.show {
            display: block;
        }

        .security-badge {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔧</div>
            <h1>OpenClaw One-Click Installer</h1>
            <p class="subtitle">Automated setup with ClawJacked Shield security</p>
        </div>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>Automatic Node.js 22 LTS installation</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>WSL2 with systemd support (x64)</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>ClawJacked Shield security hardening</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>2-minute silent installation</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-install" id="installBtn" onclick="startInstallation()">Start Installation</button>
            <button class="btn-cancel" onclick="window.close()">Cancel</button>
        </div>

        <div class="status" id="status"></div>
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="log" id="log"></div>

        <div class="security-badge">🔒 ClawJacked Shield Active</div>
    </div>

    <script src="preload.js"></script>
    <script>
        async function startInstallation() {
            const btn = document.getElementById('installBtn');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const log = document.getElementById('log');

            btn.disabled = true;
            status.classList.remove('show', 'success', 'error', 'info');
            progress.classList.add('show');
            log.classList.add('show');
            log.innerHTML = 'Starting installation...\n';

            try {
                status.textContent = 'Running installation...';
                status.className = 'status show info';

                const result = await window.api.runInstaller();

                log.innerHTML += '\n✓ Installation completed successfully!\n';
                status.textContent = '✓ Installation completed! OpenClaw is ready to use.';
                status.className = 'status show success';
                document.getElementById('progressFill').style.width = '100%';

                setTimeout(() => {
                    window.close();
                }, 3000);

            } catch (error) {
                log.innerHTML += '\n✗ Installation failed!\n' + error.error + '\n';
                status.textContent = '✗ Installation failed. Please check the logs above.';
                status.className = 'status show error';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
